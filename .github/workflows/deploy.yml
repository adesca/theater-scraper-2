name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "e2e/**"
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/deploy.yml"

jobs:
  unit-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: Backend tests
            prefix: backend
          - name: Frontend tests
            prefix: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.prefix }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.prefix }}

      - name: Run tests
        run: npm run --prefix ${{ matrix.prefix }} test

  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

  deploy-backend:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - playwright

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            set -e

            cd ~/theater-scraper-2

            git fetch origin
            git checkout main
            git reset --hard origin/main

            npm ci --prefix backend
            npm run --prefix backend build

            npm ci --prefix frontend
            npm run --prefix frontend build

            rm -rf /var/www/theater-scraper/*
            cp -r frontend/dist/. /var/www/theater-scraper/

            pm2 startOrReload ecosystem.config.js --env production
            pm2 save