name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "../../backend"
      - ".github/workflows/deploy.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            set -e

            cd ~/theater-scraper-2

            git fetch origin
            git checkout main
            git reset --hard origin/main

            npm ci --prefix backend
            npm run --prefix backend build

            if pm2 describe theater-scraper-2-backend > /dev/null; then
              pm2 reload theater-scraper-2-backend
            else
              pm2 start backend/dist/server.js --name theater-scraper-2-backend
            fi

            pm2 save
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --prefix frontend

      - run: npm run --prefix frontend build
        env:
          VITE_API_URL: https://api.adesca.dev

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - uses: actions/deploy-pages@v4